<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AROBOTIX — Business Plan</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0a0a;--bg-2:#0c1013;--surface:#11171b;--surface-2:#161d22;
  --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.14);
  --accent:#00d4ff;--accent-deep:#0596b8;--text:#eef3f6;--muted:#8a959d;--muted-2:#5e676e;--ok:#39d98a;--danger:#ff5a6e;
  --maxw:1080px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--accent);color:#03161c}
a{color:inherit;text-decoration:none}
.mono{font-family:'IBM Plex Mono',monospace}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);font-weight:500}
h1,h2,h3{font-family:'Chakra Petch',sans-serif;font-weight:700;line-height:1.06;letter-spacing:-.02em}
h2{font-size:clamp(1.7rem,3.6vw,2.7rem);margin-top:12px}
h3{font-size:clamp(1.05rem,1.8vw,1.35rem);font-weight:600}
.section{padding:clamp(54px,7vw,96px) 24px;position:relative}
.wrap{max-width:var(--maxw);margin:0 auto}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--line-2),transparent);max-width:var(--maxw);margin:0 auto}
.lead{font-size:clamp(1rem,1.4vw,1.18rem);color:var(--muted);font-weight:300;max-width:70ch}
.accent{color:var(--accent)}
.note{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted-2);letter-spacing:.04em;margin-top:16px;line-height:1.6}

/* reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}

/* nav */
nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
nav.scrolled{background:rgba(10,10,10,.78);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-family:'Chakra Petch',sans-serif;font-weight:700;letter-spacing:.04em;font-size:1.05rem}
.brand img{height:28px;width:auto;display:block}
.nav-tag{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.26em;color:var(--accent);font-weight:500;text-transform:uppercase}
.nav-home{font-family:'IBM Plex Mono',monospace;font-size:.76rem;color:var(--muted)}
.nav-home:hover{color:var(--accent)}
@media(max-width:560px){.nav-tag{display:none}}

/* cards / grid */
.grid{display:grid;gap:18px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:820px){.g3,.g2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:26px;position:relative;overflow:hidden;transition:transform .35s,border-color .35s,background .35s}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .35s}
.card:hover{transform:translateY(-5px);border-color:var(--line-2);background:var(--surface-2)}
.card:hover::before{opacity:1}
.card h3{margin-bottom:8px}
.card p{color:var(--muted);font-size:.94rem}
.idx{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:.74rem;letter-spacing:.08em}
.phase{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:.72rem;letter-spacing:.16em;margin-bottom:10px}
.member .role{color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:.76rem;letter-spacing:.03em;margin:2px 0 10px}

ul.tick{list-style:none;margin-top:8px;display:flex;flex-direction:column;gap:10px}
ul.tick li{display:flex;gap:11px;color:var(--muted);font-size:.92rem}
ul.tick li::before{content:"▪";color:var(--accent);font-size:.66rem;margin-top:6px}

/* tables */
.ctable{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.ctable th{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;text-align:left;padding:16px 20px;border-bottom:1px solid var(--line)}
.ctable th.ax{color:var(--accent)}
.ctable td{padding:15px 20px;border-bottom:1px solid var(--line);font-size:.92rem;vertical-align:top}
.ctable tr:last-child td{border-bottom:none}
.ctable tbody tr{transition:background .25s}
.ctable tbody tr:hover{background:rgba(0,212,255,.04)}
.ctable .old{color:var(--muted)}
.ctable.risks td:first-child{color:var(--accent);font-weight:500;width:30%}
.ctable.risks td{color:var(--muted)}

/* stats + charts */
.mstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.mstat{border:1px solid var(--line);border-radius:8px;padding:24px;background:var(--surface);transition:all .35s}
.mstat:hover{border-color:var(--accent);transform:translateY(-4px)}
.mstat .v{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(1.9rem,4vw,2.7rem);line-height:1}
.mstat .l{color:var(--accent);font-weight:500;margin-top:8px;font-size:.95rem}
.mstat .s{color:var(--muted);font-size:.82rem;margin-top:3px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.charts{grid-template-columns:1fr}}
.chartcard{border:1px solid var(--line);border-radius:8px;padding:24px;background:var(--surface)}
.chartcard h4{font-family:'Chakra Petch',sans-serif;font-weight:600;margin-bottom:5px}
.chartcard .cap{color:var(--muted);font-size:.82rem;margin-bottom:16px}
.chartwrap{position:relative;height:230px}

/* gapbox */
.gapbox{background:linear-gradient(135deg,rgba(0,212,255,.06),transparent);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:28px;display:grid;grid-template-columns:1.5fr 1fr;gap:28px}
@media(max-width:820px){.gapbox{grid-template-columns:1fr}}
.gapbox .big{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(1.2rem,2.2vw,1.6rem);line-height:1.18;color:var(--accent)}

/* tech-spec */
.tech-spec{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--surface)}
.tech-spec .hd{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:14px 18px;border-bottom:1px solid var(--line);background:var(--bg-2)}
.tech-spec .li{display:flex;justify-content:space-between;gap:16px;padding:13px 18px;border-bottom:1px solid var(--line);font-size:.88rem}
.tech-spec .li:last-child{border-bottom:none}
.tech-spec .li .key{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.8rem}
.tech-spec .li .val{color:var(--text);text-align:right}

/* sol list */
.sol{display:grid;gap:40px;align-items:start}
@media(max-width:820px){.sol{grid-template-columns:1fr!important;gap:28px}}
.sol-list{display:flex;flex-direction:column;gap:6px}
.sol-list .it{display:flex;gap:16px;padding:15px 0;border-bottom:1px solid var(--line);transition:padding-left .3s}
.sol-list .it:hover{padding-left:8px}
.sol-list .it .n{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:.8rem;min-width:28px;padding-top:3px}
.sol-list .it h4{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:1rem;margin-bottom:2px}
.sol-list .it p{color:var(--muted);font-size:.9rem}

/* bp specials */
.bp-title{padding-top:140px;text-align:center}
.bp-title h1{font-size:clamp(3rem,9vw,6rem);font-family:'Chakra Petch',sans-serif;font-weight:700;letter-spacing:.02em;margin:14px 0}
.bp-tagline{color:var(--muted);font-size:clamp(1rem,1.6vw,1.25rem);max-width:50ch;margin:0 auto}
.bp-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 26px;margin-top:30px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.bp-meta span{position:relative}
.bp-meta span:not(:last-child)::after{content:"·";color:var(--accent);position:absolute;right:-15px}
.draft-flag{display:inline-block;margin-top:34px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.04em;color:#ffce5a;border:1px solid rgba(255,206,90,.35);background:rgba(255,206,90,.06);border-radius:4px;padding:10px 16px;max-width:60ch;line-height:1.6}
.toc{display:grid;grid-template-columns:repeat(2,1fr);gap:2px 30px;margin-top:24px}
@media(max-width:680px){.toc{grid-template-columns:1fr}}
.toc a{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid var(--line);font-size:.95rem;color:var(--muted);transition:color .25s,padding-left .25s}
.toc a span{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:.82rem;min-width:24px}
.toc a:hover{color:var(--text);padding-left:6px}
.bp-contact{display:flex;flex-wrap:wrap;gap:22px;margin-top:30px;font-family:'IBM Plex Mono',monospace;font-size:.86rem;color:var(--muted)}
.bp-contact a:hover{color:var(--accent)}

/* GATE */
#gate{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
#gate .grid-bg{position:absolute;inset:0;opacity:.4;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(110% 80% at 50% 40%,#000 30%,transparent 75%)}
.gate-card{position:relative;width:100%;max-width:420px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:40px 34px;text-align:center}
.gate-card .logo{height:54px;width:auto;margin:0 auto 16px;display:block}
.gate-card .gate-sub{font-family:'IBM Plex Mono',monospace;font-weight:500;letter-spacing:.22em;font-size:.74rem;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.gate-card h2{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1.5rem;letter-spacing:.14em;color:var(--text);margin:0 0 4px}
.gate-card p{color:var(--muted);font-size:.9rem;margin-bottom:24px}
.gate-card .row{display:flex;flex-direction:column;gap:12px}
.gate-card input{width:100%;background:var(--bg-2);border:1px solid var(--line-2);border-radius:6px;padding:13px 15px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.92rem;outline:none;transition:border-color .2s;text-align:center}
.gate-card input:focus{border-color:var(--accent)}
.gate-card button{width:100%;background:var(--accent);color:#03161c;border:none;border-radius:6px;padding:13px 20px;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:.88rem;cursor:pointer;transition:box-shadow .25s}
.gate-card button:hover{box-shadow:0 0 24px rgba(0,212,255,.4)}
.gate-card button:disabled{opacity:.5;cursor:wait;box-shadow:none}
.gate-err{color:var(--danger);font-family:'IBM Plex Mono',monospace;font-size:.8rem;margin-top:16px;min-height:18px}
.gate-foot{margin-top:26px;font-family:'IBM Plex Mono',monospace;font-size:.66rem;letter-spacing:.06em;color:var(--muted-2);line-height:1.6}
#content{display:none}

footer{border-top:1px solid var(--line);padding:30px 24px;background:var(--bg)}
footer .wrap{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--muted-2);letter-spacing:.04em}
footer a{color:var(--muted)}footer a:hover{color:var(--accent)}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="grid-bg"></div>
  <div class="gate-card">
    <img class="logo" src="arobotix-logo-white.png" alt="AROBOTIX">
    <h2>AROBOTIX</h2>
    <div class="gate-sub">Confidential</div>
    <p>This business plan is encrypted. Enter the access password to continue.</p>
    <div class="row">
      <input id="pw" type="password" placeholder="Access password" autocomplete="off" autofocus />
      <button id="unlock">Unlock</button>
    </div>
    <div class="gate-err" id="err"></div>
    <div class="gate-foot">AROBOTIX Corp. · AES-256 encrypted · Authorized recipients only</div>
  </div>
</div>

<!-- NAV (revealed after unlock) -->
<nav id="nav" style="display:none">
  <a class="brand" href="index.html"><img src="arobotix-logo-white.png" alt="AROBOTIX">AROBOTIX</a>
  <span class="nav-tag">Confidential Business Plan</span>
  <a class="nav-home" href="index.html">← Main site</a>
</nav>

<!-- CONTENT (decrypted in place) -->
<div id="content"></div>

<footer id="foot" style="display:none">
  <div class="wrap">
    <span>AROBOTIX CORP. · © 2026 · CONFIDENTIAL</span>
    <span><a href="index.html">Main site</a> · <a href="mailto:info@arobotix.com">info@arobotix.com</a></span>
  </div>
</footer>

function b64ToBytes(b64){const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}

async function decryptPlan(password){
  if(!(window.crypto && crypto.subtle)) throw new Error('insecure-context');
  const enc=new TextEncoder();
  const salt=b64ToBytes(PAYLOAD.salt), iv=b64ToBytes(PAYLOAD.iv), data=b64ToBytes(PAYLOAD.data);
  const keyMat=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:PAYLOAD.iters,hash:'SHA-256'},
    keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
  return new TextDecoder().decode(pt);
}

const AX='#00d4ff',GRID='rgba(255,255,255,.06)',MUT='#8a959d';
function initCharts(){
  if(typeof Chart==='undefined') return;
  Chart.defaults.font.family="'IBM Plex Mono', monospace";
  Chart.defaults.color=MUT; Chart.defaults.font.size=11;
  const m=document.getElementById('bpMarketChart');
  if(m) new Chart(m,{type:'bar',
    data:{labels:['TAM $16.45T','SAM $164B','AEC SW $9.17B'],datasets:[{data:[16450,164,9.17],backgroundColor:[AX,'rgba(0,212,255,.55)','rgba(0,212,255,.3)'],borderRadius:6,barThickness:42}]},
    options:{indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.parsed.x+'B'}}},scales:{x:{type:'logarithmic',grid:{color:GRID},ticks:{callback:v=>'$'+v+'B'}},y:{grid:{display:false}}},maintainAspectRatio:false}});
  const f=document.getElementById('bpFundsChart');
  if(f) new Chart(f,{type:'doughnut',
    data:{labels:['Engineering 65%','GTM & Pilot Ops 20%','IP Filings 10%','Team 5%'],datasets:[{data:[65,20,10,5],backgroundColor:[AX,'rgba(0,212,255,.6)','rgba(0,212,255,.38)','rgba(255,255,255,.14)'],borderColor:'#0a0a0a',borderWidth:3}]},
    options:{cutout:'60%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:12,font:{size:10}}}},maintainAspectRatio:false}});
}

function revealAll(){
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.1});
  document.querySelectorAll('.section .wrap > *').forEach((el,i)=>{el.classList.add('reveal');io.observe(el);});
}

async function unlock(){
  const btn=document.getElementById('unlock'), err=document.getElementById('err'), pw=document.getElementById('pw').value;
  err.textContent=''; btn.disabled=true; btn.textContent='...';
  try{
    const html=await decryptPlan(pw);
    document.getElementById('content').innerHTML=html;
    document.getElementById('content').style.display='block';
    document.getElementById('gate').style.display='none';
    document.getElementById('nav').style.display='flex';
    document.getElementById('foot').style.display='block';
    initCharts(); revealAll();
    addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',scrollY>40));
  }catch(e){
    btn.disabled=false; btn.textContent='Unlock';
    if(e.message==='insecure-context'){err.textContent='Open over https:// or localhost to decrypt.';}
    else{err.textContent='Incorrect password.'; document.getElementById('pw').select();}
  }
}
document.getElementById('unlock').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
